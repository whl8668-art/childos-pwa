<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f1e8">
  <meta name="description" content="ChildOS v2.5 AI 行动决策器">
  <link rel="manifest" href='data:application/manifest+json,{"name":"ChildOS Decision","short_name":"ChildOS","start_url":".","display":"standalone","background_color":"#f6f1e8","theme_color":"#f6f1e8","icons":[]}'>
  <title>ChildOS 行动决策器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e8;
      --panel: #fffdf8;
      --text: #24211d;
      --muted: #6b6258;
      --line: #ddd2c2;
      --accent: #2f6f73;
      --accent-dark: #245b5e;
      --warning: #8a4b1f;
      --error: #9a2f2f;
      --shadow: 0 12px 30px rgba(53, 43, 30, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(680px, 100%);
      margin: 0 auto;
      padding: 26px 16px 42px;
    }

    header {
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    p,
    li {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.58;
    }

    p {
      margin: 0;
    }

    ul {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 16px;
      margin: 0;
      padding-left: 20px;
    }

    .card,
    .input-panel,
    .result-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .card {
      margin-top: 12px;
      padding: 15px 16px;
    }

    .boundary {
      border-color: rgba(138, 75, 31, 0.28);
    }

    .boundary h2 {
      color: var(--warning);
    }

    .input-panel {
      margin-top: 16px;
      padding: 16px;
    }

    label {
      display: block;
      margin-bottom: 9px;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.35;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      font: inherit;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 111, 115, 0.16);
    }

    button {
      width: 100%;
      min-height: 48px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      padding: 12px 16px;
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }

    button:disabled {
      cursor: progress;
      opacity: 0.75;
    }

    button:active:not(:disabled) {
      background: var(--accent-dark);
      transform: translateY(1px);
    }

    .status {
      min-height: 22px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status.error {
      color: var(--error);
      font-weight: 700;
    }

    .result-panel {
      margin-top: 16px;
      padding: 16px;
    }

    .result-panel[hidden] {
      display: none;
    }

    .result-grid {
      display: grid;
      gap: 12px;
    }

    .result-item {
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .result-item:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .result-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .result-text {
      color: var(--text);
      font-size: 17px;
      line-height: 1.55;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    @media (max-width: 420px) {
      main {
        padding-top: 22px;
      }

      h1 {
        font-size: 25px;
      }

      ul {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>ChildOS 行动决策器</h1>
    </header>

    <section class="card" aria-labelledby="current-goal-title">
      <h2 id="current-goal-title">当前阶段目标</h2>
      <p>学校任务保底，期末复习小步推进，课外班欠账不扩大，妈妈不爆炸。</p>
    </section>

    <section class="card" aria-labelledby="long-term-title">
      <h2 id="long-term-title">孩子长期培养目标</h2>
      <ul>
        <li>独立生活能力</li>
        <li>真实责任感</li>
        <li>学习输出能力</li>
        <li>表达与关系能力</li>
        <li>稳定自我认同</li>
        <li>时代适应力</li>
      </ul>
    </section>

    <section class="card" aria-labelledby="brake-title">
      <h2 id="brake-title">妈妈刹车提醒</h2>
      <p>今天不是要把孩子改好。今天只做一个不伤关系、能恢复秩序的小行动。</p>
    </section>

    <section class="card boundary" aria-labelledby="boundary-title">
      <h2 id="boundary-title">系统边界提醒</h2>
      <p>ChildOS 不是用来要求孩子达到妈妈标准的系统。它只帮助妈妈在当下少做冲动、少做过度干预、少把焦虑传给孩子。</p>
    </section>

    <section class="input-panel" aria-labelledby="scene-title">
      <label id="scene-title" for="scene">现在发生了什么？</label>
      <textarea id="scene" autocomplete="off" placeholder="例如：孩子作业没完成，我有点着急"></textarea>
      <button id="generate" type="button">生成行动决策</button>
      <div id="status" class="status" aria-live="polite">当前使用：等待 AI 生成</div>
    </section>

    <section id="result" class="result-panel" aria-labelledby="result-title" aria-live="polite" hidden>
      <h2 id="result-title">行动决策卡</h2>
      <div class="result-grid">
        <div class="result-item">
          <div class="result-label">当前判断：</div>
          <div id="current_judgment" class="result-text"></div>
        </div>
        <div class="result-item">
          <div class="result-label">现在只做：</div>
          <div id="one_action" class="result-text"></div>
        </div>
        <div class="result-item">
          <div class="result-label">不要做：</div>
          <div id="do_not_do" class="result-text"></div>
        </div>
        <div class="result-item">
          <div class="result-label">对孩子说：</div>
          <div id="say_to_child" class="result-text"></div>
        </div>
        <div class="result-item">
          <div class="result-label">复盘点：</div>
          <div id="review_point" class="result-text"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const sceneInput = document.getElementById("scene");
    const generateButton = document.getElementById("generate");
    const statusText = document.getElementById("status");
    const resultPanel = document.getElementById("result");
    const fields = {
      current_judgment: document.getElementById("current_judgment"),
      one_action: document.getElementById("one_action"),
      do_not_do: document.getElementById("do_not_do"),
      say_to_child: document.getElementById("say_to_child"),
      review_point: document.getElementById("review_point")
    };

    function isValidCard(card) {
      return card
        && typeof card.current_judgment === "string"
        && typeof card.one_action === "string"
        && typeof card.do_not_do === "string"
        && typeof card.say_to_child === "string"
        && typeof card.review_point === "string";
    }

    function renderCard(card) {
      Object.entries(fields).forEach(([key, element]) => {
        element.textContent = card[key];
      });
      resultPanel.hidden = false;
    }

    function clearCard() {
      Object.values(fields).forEach((element) => {
        element.textContent = "";
      });
      resultPanel.hidden = true;
    }

    async function requestAiCard(scene) {
      const response = await fetch("/api/childos-decision", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ scene })
      });

      const payload = await response.json().catch(() => null);

      if (!response.ok) {
        throw new Error(payload?.detail || payload?.error || "AI service unavailable");
      }

      if (payload?.source !== "ai" || !isValidCard(payload.card)) {
        throw new Error("AI response shape is invalid");
      }

      return payload.card;
    }

    async function generateDecision() {
      const scene = sceneInput.value.trim();
      clearCard();
      statusText.classList.remove("error");

      if (!scene) {
        statusText.textContent = "请先输入一个场景。";
        statusText.classList.add("error");
        return;
      }

      generateButton.disabled = true;
      generateButton.textContent = "生成中，请稍等...";
      statusText.textContent = "当前使用：AI 决策生成中";

      try {
        const card = await requestAiCard(scene);
        renderCard(card);
        statusText.textContent = "当前使用：AI 决策";
      } catch (error) {
        statusText.textContent = `AI 调用失败：${error.message}`;
        statusText.classList.add("error");
      } finally {
        generateButton.disabled = false;
        generateButton.textContent = "生成行动决策";
      }
    }

    generateButton.addEventListener("click", generateDecision);
  </script>
</body>
</html>
