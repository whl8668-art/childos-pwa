<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f3ea">
  <meta name="description" content="ChildOS v2 本地决策验证页面">
  <link rel="manifest" href='data:application/manifest+json,{"name":"ChildOS Decision","short_name":"ChildOS","start_url":".","display":"standalone","background_color":"#f7f3ea","theme_color":"#f7f3ea","icons":[]}'>
  <title>ChildOS v2 决策卡</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --panel: #fffdf8;
      --text: #24211d;
      --muted: #6d665d;
      --line: #ddd3c4;
      --accent: #2f6f73;
      --accent-dark: #245b5e;
      --shadow: 0 14px 35px rgba(54, 44, 31, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(680px, 100%);
      margin: 0 auto;
      padding: 28px 16px 40px;
    }

    header {
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .panel,
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 170px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      font: inherit;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 111, 115, 0.16);
    }

    button {
      width: 100%;
      min-height: 48px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      padding: 12px 16px;
      font: inherit;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }

    button:active {
      background: var(--accent-dark);
      transform: translateY(1px);
    }

    .card {
      margin-top: 16px;
      padding: 18px;
    }

    .card[hidden] {
      display: none;
    }

    .card-title {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .action {
      margin: 0;
      font-size: 24px;
      line-height: 1.35;
      font-weight: 800;
    }

    @media (max-width: 420px) {
      main {
        padding-top: 22px;
      }

      h1 {
        font-size: 24px;
      }

      .action {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>ChildOS v2 决策卡</h1>
      <p>输入一个抽象场景，页面按优先级只生成一个行动。</p>
    </header>

    <section class="panel" aria-label="场景输入">
      <label for="scene">场景描述</label>
      <textarea id="scene" placeholder="例如：明天要交学习任务，但一直拖延，还出现焦虑。"></textarea>
      <button id="generate" type="button">生成唯一行动</button>
    </section>

    <section id="result" class="card" aria-live="polite" hidden>
      <div class="card-title">唯一行动</div>
      <p id="action" class="action"></p>
    </section>
  </main>

  <script>
    const signalPatterns = {
      time: /ddl|deadline|截止|到期|今天|今晚|明天|马上|立刻|尽快|来不及|周.前|要交|交作业|交任务/,
      irreversible: /拖延|没写|未写|没做|未做|未完成|没完成|欠账|没开始|补不完|落下|来不及/,
      learning: /学习|作业|复习|预习|数学|英语|语文|科学|知识点|错题|题目|考试|测验/,
      emotion: /焦虑|急躁|烦躁|崩溃|生气|哭|压力|紧张|冲突|吵|不想学|抗拒/
    };

    const priorities = [
      { name: "time", rank: 1 },
      { name: "irreversible", rank: 2 },
      { name: "learning", rank: 3 },
      { name: "emotion", rank: 4 }
    ];

    const sceneInput = document.getElementById("scene");
    const generateButton = document.getElementById("generate");
    const resultCard = document.getElementById("result");
    const actionText = document.getElementById("action");

    function understandScene(text) {
      const signals = Object.fromEntries(
        Object.entries(signalPatterns).map(([name, pattern]) => [name, pattern.test(text)])
      );
      const matchedPriorities = priorities.filter((priority) => signals[priority.name]);

      return {
        signals,
        hasConflict: matchedPriorities.length > 1,
        topPriority: matchedPriorities[0]?.name || "default"
      };
    }

    function decideSingleAction(scene) {
      const { signals, topPriority } = scene;

      if (topPriority === "time") {
        if (signals.learning && /复习|考试|测验|错题|知识点|数学/.test(sceneInput.value)) {
          return "立刻开始复习一个知识点";
        }

        if (signals.learning && /英语/.test(sceneInput.value)) {
          return "完成英语一句输出";
        }

        if (signals.learning) {
          return "完成作业";
        }

        return "确认最近截止任务";
      }

      if (topPriority === "irreversible") {
        if (signals.learning) {
          return "立刻开始学习任务";
        }

        return "启动未完成任务";
      }

      if (topPriority === "learning") {
        if (/英语/.test(sceneInput.value)) {
          return "完成英语一句输出";
        }

        if (/复习|数学|知识点|错题|考试|测验/.test(sceneInput.value)) {
          return "复习一个知识点";
        }

        return "完成作业";
      }

      if (topPriority === "emotion") {
        return "停止干预并观察10分钟";
      }

      return "记录一个抽象场景";
    }

    function renderAction() {
      const text = sceneInput.value.trim();
      const scene = understandScene(text);
      const action = decideSingleAction(scene);

      actionText.textContent = action;
      resultCard.hidden = false;
    }

    generateButton.addEventListener("click", renderAction);

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      const swCode = `
        self.addEventListener("install", (event) => self.skipWaiting());
        self.addEventListener("activate", (event) => event.waitUntil(self.clients.claim()));
        self.addEventListener("fetch", (event) => event.respondWith(fetch(event.request)));
      `;
      const swUrl = URL.createObjectURL(new Blob([swCode], { type: "text/javascript" }));
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  </script>
</body>
</html>
